[package]
edition = "2024"
rust-version = "1.93"
name = "all-smi"
version = "0.22.0"
authors = ["Jeongkyu Shin <inureyes@gmail.com>"]
build = "build.rs"
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Command-line utility for monitoring GPU hardware. It provides a real-time view of GPU utilization, memory usage, temperature, power consumption, and other metrics."
readme = "README.md"
keywords = [
    "cli",
    "rust",
]
categories = ["command-line-utilities"]
license = "Apache-2.0"
repository = "https://github.com/lablup/all-smi"

[features]
cli = [
    "dep:clap",
    "dep:crossterm",
    "dep:axum",
    "dep:tower-http",
    "dep:anyhow",
    "dep:toml",
    "dep:dirs",
]
default = ["cli"]
furiosa = ["furiosa-smi-rs"]
level_zero = []
# Google TPU support via gRPC. Off by default because it requires `protoc`
# at build time and pulls in the tonic/prost gRPC stack. Enable with
# `--features tpu` when TPU support is needed.
tpu = ["dep:tonic", "dep:prost", "dep:prost-types"]
# Tenstorrent NPU support via the luwen crate family. Off by default
# because the luwen build script requires `protoc` and pulls in a large
# protobuf/gRPC toolchain that is unnecessary for GPU-temperature-only
# consumers. Enable with `--features tenstorrent` when NPU support is
# needed.
tenstorrent = [
    "dep:all-smi-luwen-core",
    "dep:all-smi-luwen-if",
    "dep:all-smi-luwen-ref",
    "dep:all-smi-ttkmd-if",
]
mock = [
    "cli",
    "dep:rand",
    "dep:hyper",
    "dep:hyper-util",
]

[lib]
name = "all_smi"
path = "src/lib.rs"

[[bin]]
name = "all-smi"
path = "src/main.rs"
required-features = ["cli"]

[[bin]]
name = "all-smi-mock-server"
path = "src/bin/all-smi-mock-server.rs"
required-features = ["mock"]

[[bin]]
name = "debug-pid-mapping"
path = "src/bin/debug-pid-mapping.rs"

[[example]]
